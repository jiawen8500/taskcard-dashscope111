<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>任务卡工作台</title>

<style>

body{
font-family:system-ui,-apple-system;
margin:0;
background:#f6f8fb;
color:#0f172a;
}

header{
padding:20px;
background:#111827;
color:white;
}

.container{
display:flex;
gap:20px;
padding:24px;
}

.panel{
flex:1;
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

textarea{
width:100%;
height:200px;
border:1px solid #e5e7eb;
border-radius:8px;
padding:10px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#f8fafc;
padding:12px;
border-radius:8px;
border:1px solid #e5e7eb;
white-space:pre-wrap;
}

</style>

</head>

<body>

<header>
<h2>任务卡工作台</h2>
<div>基于历史任务逻辑增强的任务生成系统</div>
</header>

<div class="container">

<div class="panel">

<h3>任务输入</h3>

<select id="model">
<option value="qwen-plus">qwen-plus</option>
<option value="qwen-max">qwen-max</option>
</select>

<br><br>

<textarea id="brief" placeholder="输入任务brief..."></textarea>

<br><br>

<button onclick="generate()">生成任务卡</button>

</div>

<div class="panel">

<h3>生成结果</h3>

<div id="output" class="result"></div>

<br>

<button onclick="copyFeishu()">复制飞书格式</button>

</div>

</div>

<script>

const HISTORY_RULES = `
任务卡写作规则：

简单任务：
背景一句话
目的说明为什么做
行动1-3条
成果定义明确
结束标准可关闭

复杂任务：
战略意图说明为什么做
底层逻辑体现因果链
成功画面可观察
边界提醒说明限制
行动包含Owner与DDL
`;

const HISTORY_EXAMPLES = `

历史简单任务示例：

案例1：
背景：BI工具能力依赖数据团队，导致生产力瓶颈。
目的：培养业务同学自助分析能力。
行动：
1.筛选业务同学
2.完成BI教学
成果定义：业务同学可独立分析数据
结束标准：5名业务同学具备能力

案例2：
背景：电器产品能力不足。
目的：补齐研发能力。
行动：
1.对齐研发产品供应链
2.制定人才招聘方案
成果定义：形成能力建设方案
结束标准：确认方案并启动招聘


历史复杂任务示例：

案例1：
战略意图：升级战略地图支持策略制定。
底层逻辑：
1.数据分析不完整
2.渠道策略需要支持
成功画面：
战略地图完整
边界提醒：
不展开所有品类
背景：凝胶会议提出需求
行动：
Owner:XX DDL:XX 梳理渠道数据

案例2：
战略意图：建立除甲醛第一品牌认知。
底层逻辑：
消费者需要信任背书
成功画面：
直播间形成第一品牌心智
边界提醒：
表达必须合规
背景：直播转化效率需要提升
行动：
Owner:XX DDL:XX 完成市场认证路径

`;

async function generate(){

const brief=document.getElementById("brief").value;
const model=document.getElementById("model").value;

const prompt = `
${HISTORY_RULES}

${HISTORY_EXAMPLES}

当前任务brief：
${brief}

请按照历史任务卡逻辑生成完整任务卡
`;

const res=await fetch("/api/dashscope",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
model:model,
prompt:prompt,
temperature:0.2
})
});

const data=await res.json();

document.getElementById("output").innerText=data.content || data.error;

}

function copyFeishu(){

const text=document.getElementById("output").innerText;

const feishu = `## 任务卡\n\n${text}`;

navigator.clipboard.writeText(feishu);

alert("已复制为飞书格式");

}

</script>

</body>
</html>
